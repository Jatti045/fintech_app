spring.application.name=fintech-api-test

# Dedicated test datasource (PostgreSQL). Override via environment variables when needed.
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/fintech_api_test}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep schema lifecycle isolated for integration tests.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Use a deterministic JWT secret for test token generation.
app.jwt.secret-key=${TEST_JWT_SECRET_KEY:test-secret-key-test-secret-key-1234567890}

# Avoid requiring external cloud/email setup in local test runs.
app.mail.from=test@local.dev
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
app.cloudinary.cloud-name=test
app.cloudinary.api-key=test
app.cloudinary.api-secret=test
app.cloudinary.profile-folder=test-profile-pictures

